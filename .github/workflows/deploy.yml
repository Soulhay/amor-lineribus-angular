name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # base-href matters because GitHub Pages serves project sites from a
      # subpath, not the domain root.
      - name: Build
        run: npx ng build --configuration production --base-href /amor-lineribus-angular/

      # Angular 16 emits to dist/<project-name>/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/amor-lineribus-angular

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4